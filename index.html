<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Лента — оставь сообщение, рисунок или фото</title>
  <meta name="description" content="Общая лента: каждый может оставить текстовое сообщение, рисунок или фото." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E💬%3C/text%3E%3C/svg%3E" />
  <script>
    // Версия для cache-busting — генерируется при загрузке страницы
    window.__ASSET_VER = Date.now();
    document.write('<link rel="stylesheet" href="styles.css?v=' + window.__ASSET_VER + '">');
  </script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <svg class="logo" viewBox="0 0 32 32" aria-label="Логотип" fill="none">
        <circle cx="16" cy="16" r="14" stroke="currentColor" stroke-width="2"/>
        <path d="M10 14h12M10 18h8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span class="brand-name">Лента</span>
    </div>
    <div class="topbar-actions">
      <button type="button" class="btn btn-ghost btn-refresh" id="refresh-btn" title="Обновить ленту" aria-label="Обновить ленту">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15.5-6.3L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15.5 6.3L3 16"/><path d="M3 21v-5h5"/></svg>
        <span class="btn-refresh-label">Обновить</span>
      </button>
      <div id="auth-area" class="auth-area-inline">
        <!-- Заполняется из JS: либо кнопки Войти/Регистрация, либо меню пользователя -->
      </div>
    </div>
  </header>

  <main class="feed-wrap">
    <!-- Composer -->
    <section class="composer card" aria-label="Создать пост">
      <div class="composer-row" id="anon-name-row">
        <input type="text" id="author-name" class="input" maxlength="40" placeholder="Ваше имя (или оставьте пустым)" />
      </div>
      <div class="composer-row hidden" id="auth-name-row">
        <div class="auth-as">
          <img id="composer-avatar" class="avatar-img small" alt="" />
          <div>
            <div class="muted">Публикуете как</div>
            <div class="auth-as-name" id="composer-author-display"></div>
          </div>
        </div>
      </div>
      <textarea id="post-text" class="input textarea" maxlength="500" placeholder="Напишите что-нибудь..." rows="3"></textarea>

      <div id="attachment-preview" class="attachment-preview hidden">
        <img id="attachment-img" alt="Предпросмотр вложения" />
        <button type="button" id="remove-attachment" class="remove-btn" aria-label="Удалить вложение">×</button>
      </div>

      <div class="composer-actions">
        <div class="composer-tools">
          <button type="button" id="open-paint" class="btn btn-ghost" title="Нарисовать">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21l4-1 12-12-3-3L4 17l-1 4z"/><path d="M14 6l3 3"/></svg>
            <span>Нарисовать</span>
          </button>
          <button type="button" id="upload-photo" class="btn btn-ghost" title="Загрузить фото">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="9" cy="11" r="2"/><path d="M21 17l-5-5-9 9"/></svg>
            <span>Фото</span>
          </button>
          <input type="file" id="photo-input" accept="image/*" hidden />
        </div>
        <button type="button" id="submit-post" class="btn btn-primary">Опубликовать</button>
      </div>
      <div id="composer-status" class="composer-status"></div>
    </section>

    <section id="feed" class="feed" aria-label="Лента постов">
      <div id="feed-loading" class="feed-empty">Загрузка ленты...</div>
    </section>
  </main>

  <!-- Auth modal -->
  <div id="auth-modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop" data-close></div>
    <div class="modal-content modal-content-narrow">
      <div class="modal-header">
        <h2 class="modal-title" id="auth-title">Вход</h2>
        <button type="button" class="modal-close" data-close aria-label="Закрыть">×</button>
      </div>
      <div class="modal-body">
        <div class="auth-tabs" role="tablist">
          <button class="auth-tab active" data-mode="signin" role="tab">Вход</button>
          <button class="auth-tab" data-mode="signup" role="tab">Регистрация</button>
        </div>

        <form id="auth-form" class="auth-form">
          <label class="field">
            <span class="label">Email</span>
            <input type="email" id="auth-email" class="input" required autocomplete="email" />
          </label>
          <label class="field hidden" id="signup-name-field">
            <span class="label">Ваше имя</span>
            <input type="text" id="auth-name" class="input" maxlength="60" autocomplete="nickname" />
          </label>
          <label class="field">
            <span class="label">Пароль (минимум 6 символов)</span>
            <input type="password" id="auth-password" class="input" required minlength="6" autocomplete="current-password" />
          </label>
          <div id="auth-status" class="composer-status"></div>
          <button type="submit" id="auth-submit" class="btn btn-primary btn-block">Войти</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Profile modal -->
  <div id="profile-modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop" data-close></div>
    <div class="modal-content modal-content-narrow">
      <div class="modal-header">
        <h2 class="modal-title">Профиль</h2>
        <button type="button" class="modal-close" data-close aria-label="Закрыть">×</button>
      </div>
      <div class="modal-body">
        <div class="profile-avatar-row">
          <img id="profile-avatar" class="avatar-img xl" alt="Аватар" />
          <div class="profile-avatar-actions">
            <button type="button" id="upload-avatar" class="btn btn-ghost">Загрузить аватар</button>
            <button type="button" id="remove-avatar" class="btn btn-ghost btn-danger hidden">Убрать</button>
            <input type="file" id="avatar-input" accept="image/*" hidden />
            <div class="muted small">PNG или JPG, до 2 МБ</div>
          </div>
        </div>
        <label class="field">
          <span class="label">Имя</span>
          <input type="text" id="profile-name" class="input" maxlength="60" />
        </label>
        <label class="field">
          <span class="label">Email</span>
          <input type="email" id="profile-email" class="input" disabled />
        </label>
        <div id="profile-status" class="composer-status"></div>
      </div>
      <div class="modal-footer">
        <button type="button" id="signout-btn" class="btn btn-ghost btn-danger">Выйти</button>
        <div class="modal-footer-right">
          <button type="button" class="btn btn-ghost" data-close>Отмена</button>
          <button type="button" id="save-profile" class="btn btn-primary">Сохранить</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Paint modal -->
  <div id="paint-modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop" data-close></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title">Нарисовать</h2>
        <button type="button" class="modal-close" data-close aria-label="Закрыть">×</button>
      </div>

      <div class="paint-workspace">
        <aside class="paint-toolbar" aria-label="Инструменты">
          <div class="tool-group horizontal">
            <button class="tool active" data-tool="brush" title="Кисть" aria-label="Кисть">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21l4-1 12-12-3-3L4 17l-1 4z"/><path d="M14 6l3 3"/></svg>
            </button>
            <button class="tool" data-tool="eraser" title="Ластик" aria-label="Ластик">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l6 6h12"/><path d="M21 9L13 1 3 11l8 8"/></svg>
            </button>
          </div>
          <div class="divider"></div>
          <div class="tool-group">
            <label class="label">Цвет</label>
            <input type="color" id="color-picker" value="#111111" aria-label="Выбор цвета" />
            <div class="swatches" id="swatches" role="group" aria-label="Палитра">
              <button class="swatch" style="--c:#000000" data-color="#000000" aria-label="Чёрный"></button>
              <button class="swatch" style="--c:#ffffff" data-color="#ffffff" aria-label="Белый"></button>
              <button class="swatch" style="--c:#ef4444" data-color="#ef4444" aria-label="Красный"></button>
              <button class="swatch" style="--c:#f97316" data-color="#f97316" aria-label="Оранжевый"></button>
              <button class="swatch" style="--c:#eab308" data-color="#eab308" aria-label="Жёлтый"></button>
              <button class="swatch" style="--c:#22c55e" data-color="#22c55e" aria-label="Зелёный"></button>
              <button class="swatch" style="--c:#06b6d4" data-color="#06b6d4" aria-label="Голубой"></button>
              <button class="swatch" style="--c:#3b82f6" data-color="#3b82f6" aria-label="Синий"></button>
              <button class="swatch" style="--c:#8b5cf6" data-color="#8b5cf6" aria-label="Фиолетовый"></button>
              <button class="swatch" style="--c:#ec4899" data-color="#ec4899" aria-label="Розовый"></button>
              <button class="swatch" style="--c:#78350f" data-color="#78350f" aria-label="Коричневый"></button>
              <button class="swatch" style="--c:#6b7280" data-color="#6b7280" aria-label="Серый"></button>
            </div>
          </div>
          <div class="divider"></div>
          <div class="tool-group">
            <label class="label" for="size-slider">Толщина: <span id="size-value">6</span> px</label>
            <input type="range" id="size-slider" min="1" max="60" value="6" />
            <div class="size-preview" aria-hidden="true">
              <span id="size-dot" class="size-dot"></span>
            </div>
          </div>
        </aside>

        <div class="paint-canvas-wrap">
          <canvas id="canvas" aria-label="Холст для рисования"></canvas>
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" id="clear-btn" class="btn btn-ghost">Очистить</button>
        <div class="modal-footer-right">
          <button type="button" class="btn btn-ghost" data-close>Отмена</button>
          <button type="button" id="attach-drawing" class="btn btn-primary">Прикрепить к посту</button>
        </div>
      </div>
    </div>
  </div>

  <div id="lightbox" class="lightbox hidden" data-close>
    <img id="lightbox-img" alt="" />
  </div>

  <script>
    document.write('<script src="supabase-config.js?v=' + window.__ASSET_VER + '"><\/script>');
    document.write('<script type="module" src="app.js?v=' + window.__ASSET_VER + '"><\/script>');
  </script>
</body>
</html>
